// ── STATE ───────────────────────────────────────────────────────
let page = 'dashboard', tid = null, brf = '', urg = null

// ── AUTH ────────────────────────────────────────────────────────
function login(){
  const u=document.getElementById('l-user').value.trim()
  const p=document.getElementById('l-pass').value.trim()
  if((u==='miproyecto'||u==='miproyecto@glovalgroup.com')&&p==='miproyecto'){
    document.getElementById('pg-login').style.display='none'
    document.getElementById('pg-app').style.display='block'
    go('dashboard')

}
function logout(){
  document.getElementById('pg-app').style.display='none'
  document.getElementById('pg-login').style.display='flex'
}

// ── ROUTER ──────────────────────────────────────────────────────
function go(p2,id){
  page=p2; tid=id||null

  const m={dashboard:'n-dashboard',tickets:'n-tickets',new:'n-new',categories:'n-categories',users:'n-users',detail:'n-tickets'}
  if(m[page]) document.getElementById(m[page])?.classList.add('active')
  render()
}
function render(){
  const fns={dashboard:pgDashboard,tickets:pgTickets,detail:pgDetail,new:pgNew,categories:pgCats,users:pgUsers}
  document.getElementById('content').innerHTML=(fns[page]||pgDashboard)()

// ── HELPERS ─────────────────────────────────────────────────────
function sc(s){return {ok:'#16a34a',warning:'#d97706',breached:'#dc2626',pending:'#9ca3af'}[s]||'#9ca3af'}
function sl(s){return {ok:'En plazo',warning:'Advertencia',breached:'Vencido',pending:'Pendiente'}[s]||'—'}
function sbg(s){return {ok:'#dcfce7',warning:'#fef9c3',breached:'#fee2e2',pending:'#f3f4f6'}[s]||'#f3f4f6'}
function sbc(s){return {ok:'#bbf7d0',warning:'#fde047',breached:'#fca5a5',pending:'#e5e7eb'}[s]||'#e5e7eb'}
function dot(s,sz){sz=sz||8;return `<span style="width:${sz}px;height:${sz}px;border-radius:50%;background:${sc(s)};display:inline-block;flex-shrink:0"></span>`}
function slaBadge(s){return `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid;background:${sbg(s)};color:${sc(s)};border-color:${sbc(s)}">${dot(s)} ${sl(s)}</span>`}
function stBadge(s){
  const c={abierto:'#2563eb',en_progreso:'#7c3aed',esperando_usuario:'#b45309',resuelto:'#16a34a',cerrado:'#64748b'}
  const b={abierto:'#eff6ff',en_progreso:'#f5f3ff',esperando_usuario:'#fffbeb',resuelto:'#f0fdf4',cerrado:'#f8fafc'}
  const e={abierto:'#bfdbfe',en_progreso:'#ddd6fe',esperando_usuario:'#fde68a',resuelto:'#bbf7d0',cerrado:'#e2e8f0'}
  return `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid;background:${b[s]};color:${c[s]};border-color:${e[s]}">${SS[s]}</span>`
}
function priBadge(p){
  if(!p)return '<span style="font-size:12px;color:#cbd5e1">Sin asignar</span>'

  return `<span style="font-size:12px;font-weight:700;color:${c[p]}">${PL[p]}</span>`
}
function fdt(iso){if(!iso)return '—';const d=new Date(iso);return d.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'})}

function pgTickets(){
  const fil=brf?tickets.filter(t=>t.branch===brf):tickets
  const sorted=[...fil].sort((a,b)=>{
    const w=t=>{if(!t.sla)return 4;if(t.sla.r==='breached'||t.sla.f==='breached')return 1-Math.max(t.sla.rp||0,t.sla.fp||0)/1000;if(t.sla.r==='warning'||t.sla.f==='warning')return 2;return 3}
    return w(a)-w(b)
  })
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <h1 style="font-size:20px;font-weight:800;color:#0f172a;margin:0">Tickets</h1>
    <div style="display:flex;gap:10px">
      <select onchange="brf=this.value;render()" style="border:1.5px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:12px;color:#475569;background:white">
        <option value="">Todas las sucursales</option>
        ${['peru','ecuador','usa','panama'].map(b=>`<option value="${b}" ${brf===b?'selected':''}>${BL[b]}</option>`).join('')}
      </select>
      <button onclick="go('new')" style="background:#1d4ed8;color:white;border:none;border-radius:10px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer">+ Nuevo ticket</button>
    </div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead>
        <tr style="border-bottom:1px solid #f1f5f9">
          ${['Número','Asunto / Categoría','Estado','Prioridad','Sucursal','SLA',''].map(h=>`<th style="text-align:left;padding:11px 14px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em">${h}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${sorted.map(t=>{
          const unatt=!t.fr&&!['resuelto','cerrado'].includes(t.st)
          const worst=t.sla?(t.sla.r==='breached'||t.sla.f==='breached'?'breached':t.sla.r==='warning'||t.sla.f==='warning'?'warning':'ok'):'pending'
          const lim=SLA[t.pri||'media']
          return `
          <tr onclick="go('detail','${t.id}')" style="border-bottom:1px solid #f8fafc;cursor:pointer;background:${unatt?'#fffbeb':'white'}" class="row-hover">
            <td style="padding:11px 14px">
              <div style="display:flex;align-items:center;gap:6px">
                ${unatt?`<span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;flex-shrink:0"></span>`:'<span style="width:6px;height:6px;flex-shrink:0"></span>'}
                <span style="font-family:monospace;font-size:11px;color:#64748b">${t.num}</span>
              </div>
            </td>
            <td style="padding:11px 14px;max-width:220px">
              <p style="font-weight:600;color:#0f172a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0">${t.subj}</p>
              <p style="color:#94a3b8;font-size:11px;margin:2px 0 0">${t.cat}</p>
            </td>
            <td style="padding:11px 14px">${stBadge(t.st)}</td>
            <td style="padding:11px 14px">${priBadge(t.pri)}</td>
            <td style="padding:11px 14px;color:#64748b">${BL[t.branch]}</td>
            <td style="padding:11px 14px">
              ${t.sla?`
              <div class="tip" style="display:inline-block">
                <div style="display:flex;align-items:center;gap:5px">
                  ${dot(t.sla.f)} <span style="font-size:11px;color:#64748b">${t.sla.fp!==null?t.sla.fp+'%':'?'}</span>
                  <span style="color:#cbd5e1;font-size:10px">·</span>
                  ${dot(t.sla.r)} <span style="font-size:11px;color:#64748b">${t.sla.rp!==null?t.sla.rp+'%':'?'}</span>
                </div>
                <div class="tipbox">
                  <b style="display:block;margin-bottom:4px">L&iacute;mites SLA — ${PL[t.pri||'media']||'Media'}</b>
                  <span style="opacity:.8">1ª Resp: ${lim.fr} min hábiles</span><br>
                  <span style="opacity:.8">Resolución: ${lim.res} min hábiles</span><br>
                  <div style="margin-top:6px;display:flex;gap:8px">
                    <span>&#128994; &lt;75%</span><span>&#128993; 75–100%</span><span>&#128308; &gt;100%</span>
                  </div>
                </div>
              </div>` : '<span style="font-size:11px;color:#e2e8f0">Sin prioridad</span>'}

        <div><p style="font-size:11px;color:#94a3b8;margin:0 0 3px">${l}</p><p style="font-weight:600;color:#0f172a;margin:0">${v}</p></div>`).join('')}

        <div><p style="font-size:11px;color:#94a3b8;margin:0 0 3px">Estado</p>${stBadge(t.st)}</div>
        <div><p style="font-size:11px;color:#94a3b8;margin:0 0 3px">Creado</p><p style="font-weight:600;color:#0f172a;margin:0;font-size:12px">${fdt(t.created)}</p></div>
        <div><p style="font-size:11px;color:#94a3b8;margin:0 0 3px">1ª Respuesta</p><p style="font-weight:600;color:#0f172a;margin:0;font-size:12px">${fdt(t.fr)}</p></div>
      </div>
      ${t.sla?`
      <div style="border-top:1px solid #f1f5f9;margin-top:16px;padding-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <p style="font-size:11px;color:#94a3b8;margin:0 0 6px">SLA — 1ª Respuesta</p>
          ${slaBadge(t.sla.f)}
          ${t.sla.fp!==null?`<p style="font-size:11px;color:#64748b;margin:5px 0 0">${t.sla.fp}% consumido</p>`:''}
        </div>
        <div>
          <p style="font-size:11px;color:#94a3b8;margin:0 0 6px">SLA — Resolución</p>
          ${slaBadge(t.sla.r)}
          ${t.sla.rp!==null?`<p style="font-size:11px;color:#64748b;margin:5px 0 0">${t.sla.rp}% consumido</p>`:''}
        </div>
      </div>` : ''}
    </div>

    <div class="card" style="margin-bottom:14px">
      <p style="font-size:13px;font-weight:700;color:#0f172a;margin:0 0 10px">Descripción</p>
      <p style="font-size:13px;color:#475569;line-height:1.65;margin:0">${t.desc}</p>
    </div>

    <div class="card" style="margin-bottom:14px">
      <p style="font-size:13px;font-weight:700;color:#0f172a;margin:0 0 16px">Gestión del ticket</p>

        <p style="font-size:11px;color:#94a3b8;margin:0 0 8px;text-transform:uppercase;letter-spacing:.05em;font-weight:600">Asignar prioridad</p>
        <div style="display:flex;gap:8px">
          ${PRIS.map(p=>{
            const frozen=t.pri!==null
            const cur=t.pri===p
            let style
            if(cur) style='background:#1d4ed8;color:white;border-color:#1d4ed8;opacity:1;cursor:default'
            else if(frozen) style='background:white;color:#d1d5db;border-color:#f3f4f6;opacity:.4;cursor:not-allowed'
            else style='background:white;color:#374151;border-color:#e2e8f0;cursor:pointer'
            return `<button ${frozen&&!cur?'disabled':''} onclick="setPri('${t.id}','${p}')"
              style="${style};padding:7px 14px;border-radius:9px;font-size:12px;font-weight:600;border:1.5px solid;transition:all .15s">
              ${PL[p]}
            </button>`
          }).join('')}
        </div>
      </div>

        <div style="display:flex;flex-wrap:wrap;gap:7px">
          ${STS.map(s=>{
            const cur=t.st===s, ok=allowed.includes(s), vis=visited.has(s)
            let style, ov=''
            if(cur) style='background:#f1f5f9;color:#94a3b8;border-color:#e2e8f0;cursor:default'
            else if(ok) {style='background:white;color:#374151;border-color:#e2e8f0;cursor:pointer';ov=` onmouseover="this.style.borderColor='#2563eb'" onmouseout="this.style.borderColor='#e2e8f0'"`}
            else if(vis) style='background:#f8fafc;color:#d1d5db;border-color:#f1f5f9;cursor:not-allowed'
            else style='background:#f8fafc;color:#e2e8f0;border-color:#f8fafc;cursor:not-allowed'
            return `<button ${!ok?'disabled':''} onclick="setSt('${t.id}','${s}')" ${ov}
              style="${style};padding:7px 14px;border-radius:9px;font-size:12px;font-weight:600;border:1.5px solid;transition:all .15s">
              ${SL[s]}
            </button>`
          }).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <p style="font-size:13px;font-weight:700;color:#0f172a;margin:0 0 12px">Historial de estados</p>
      <ol style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px">
        ${t.hist.length===0?'<li style="font-size:12px;color:#94a3b8">Sin historial.</li>':
          t.hist.map(h=>`
          <li style="display:flex;gap:12px;align-items:flex-start;font-size:12px;color:#64748b">
            <span style="color:#cbd5e1;white-space:nowrap;flex-shrink:0">${fdt(h.at)}</span>
            <span>${h.old?`${SL[h.old]} &rarr; `:''}
              <strong style="color:#0f172a">${SL[h.nw]}</strong>
              <span style="color:#94a3b8"> &middot; ${h.by}</span>
            </span>
          </li>`).join('')}
      </ol>
    </div>
  </div>`
}

              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:30px;height:30px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#1d4ed8;flex-shrink:0">${ini(u.name)}</div>
                <div><p style="font-weight:600;color:#0f172a;margin:0">${u.name}</p><p style="font-size:11px;color:#94a3b8;margin:1px 0 0">${u.email}</p></div>
              </div>
            </td>
            <td style="padding:11px 14px"><span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;border:1px solid;background:${rc[u.role].b};color:${rc[u.role].c};border-color:${rc[u.role].e}">${rc[u.role].l}</span></td>
            <td style="padding:11px 14px;color:#64748b">${BL[u.branch]}</td>
            <td style="padding:11px 14px;color:#64748b">${u.area||'—'}</td>
            <td style="padding:11px 14px"><span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;border:1px solid;${u.on?'background:#f0fdf4;color:#16a34a;border-color:#bbf7d0':'background:#f8fafc;color:#94a3b8;border-color:#e2e8f0'}">${u.on?'Activo':'Inactivo'}</span></td>
            <td style="padding:11px 14px"><button onclick="togUser('${u.id}')" style="font-size:12px;font-weight:600;color:${u.on?'#dc2626':'#16a34a'};background:none;border:none;cursor:pointer">${u.on?'Desactivar':'Activar'}</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`
}

// ── ACTIONS ─────────────────────────────────────────────────────
function setPri(id,p){const t=tickets.find(x=>x.id===id);if(!t||t.pri)return;t.pri=p;t.sla={f:'pending',fp:5,r:'pending',rp:1};render()}
function setSt(id,s){
  const t=tickets.find(x=>x.id===id);if(!t||!TR[t.st].includes(s))return
  const old=t.st; t.st=s
  if(!t.fr&&s!=='abierto')t.fr=new Date().toISOString()
  if(s==='resuelto'&&!t.res)t.res=new Date().toISOString()
  if(s==='cerrado'&&!t.cls)t.cls=new Date().toISOString()
  t.hist.push({id:'h'+Date.now(),old,nw:s,at:new Date().toISOString(),by:'Mi Proyecto'})
  render()
}
function selUrg(u){
  urg=u
  document.querySelectorAll('[id^="ul-"]').forEach(e=>{e.style.borderColor='#e2e8f0'})
  document.querySelectorAll('[id^="ut-"]').forEach(e=>{e.style.color='#94a3b8'})
  const lbl=document.getElementById('ul-'+u)
  if(lbl){lbl.style.borderColor='#2563eb';document.getElementById('ut-'+u).style.color='#1d4ed8'}
}
function submitTicket(){
  const catEl=document.getElementById('n-cat')
  const cid=catEl?.value; const cn=catEl?.options[catEl?.selectedIndex]?.dataset.n
  const subj=document.getElementById('n-subj')?.value.trim()
  const desc=document.getElementById('n-desc')?.value.trim()
  const err=document.getElementById('n-err')
  if(!cid||!subj||!desc||!urg){err.textContent='Completa todos los campos obligatorios.';err.style.display='block';return}
  err.style.display='none'
  const num='TK-2026-'+String(tickets.length+1).padStart(4,'0')
  const nt={id:String(Date.now()),num,subj,desc,cat:cn,catId:cid,urg,pri:null,st:'abierto',created:new Date().toISOString(),fr:null,res:null,cls:null,branch:'ecuador',creator:'Mi Proyecto',sla:null,ooh:false,hist:[{id:'h'+Date.now(),old:null,nw:'abierto',at:new Date().toISOString(),by:'Sistema'}]}
  tickets.push(nt); urg=null
  showModal(`
    <div style="width:58px;height:58px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <svg width="26" height="26" fill="none" viewBox="0 0 24 24"><path stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </div>
    <p style="font-size:11px;color:#94a3b8;font-family:monospace;margin:0 0 4px">Ticket creado exitosamente</p>
    <p style="font-size:32px;font-weight:900;color:#1d4ed8;margin:0 0 6px">${num}</p>
    <p style="font-size:14px;font-weight:600;color:#0f172a;margin:0 0 12px">${subj}</p>
    <p style="font-size:12px;color:#64748b;margin:0 0 4px"><b>Categoría:</b> ${cn}</p>
    <p style="font-size:12px;color:#64748b;margin:0 0 20px"><b>Urgencia:</b> ${UL[nt.urg]}</p>
    <p style="font-size:12px;color:#64748b;margin:0 0 24px">El ticket fue enviado al área de sistemas.</p>
    <button onclick="closeModal();go('tickets')" style="background:#1d4ed8;color:white;border:none;border-radius:10px;padding:11px 28px;font-size:13px;font-weight:700;cursor:pointer">Ver mis tickets</button>
  `)
}
function addCat(){const inp=document.getElementById('c-name');const n=inp?.value.trim();if(!n)return;cats.push({id:'c'+Date.now(),name:n,on:true});inp.value='';render()}
function togCat(id){const c=cats.find(x=>x.id===id);if(c){c.on=!c.on;render()}}
function togUser(id){const u=users.find(x=>x.id===id);if(u){u.on=!u.on;render()}}
function showModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal').style.display='flex'}
function closeModal(){document.getElementById('modal').style.display='none'}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()})
</script>
</body>
</html>
